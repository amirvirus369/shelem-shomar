<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شلم شمار حرفه‌ای</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
        /* Custom scrollbar for game history */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.3);
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col select-none pb-24">

    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-40 px-4 py-3 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img class="w-10 h-10 rounded-full border-2 border-emerald-500 object-cover" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" alt="User Avatar">
                <span class="bottom-0 left-7 absolute w-3.5 h-3.5 bg-emerald-500 border-2 border-slate-800 rounded-full"></span>
            </div>
            <div>
                <h4 class="text-sm font-bold text-slate-200">امیر محمد</h4>
                <p class="text-xs text-slate-400">میز شماره ۴</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <span class="text-xl font-black bg-gradient-to-l from-emerald-400 to-cyan-400 bg-clip-text text-transparent">SHELEM</span>
            <div class="bg-emerald-500/10 p-1.5 rounded-lg border border-emerald-500/20">
                🃏
            </div>
        </div>
    </header>

    <main class="flex-1 p-4 max-w-md mx-auto w-full flex flex-col gap-4">
        
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-4 rounded-2xl shadow-md border border-indigo-500/30 text-center">
                <span class="text-xs text-indigo-200/80 block mb-1">امتیاز کل ما</span>
                <span class="text-3xl font-black tracking-wider">۱۶۵</span>
            </div>
            <div class="bg-gradient-to-br from-rose-600 to-red-700 p-4 rounded-2xl shadow-md border border-rose-500/30 text-center">
                <span class="text-xs text-rose-200/80 block mb-1">امتیاز کل اونا</span>
                <span class="text-3xl font-black tracking-wider">۱۱۰</span>
            </div>
        </div>

        <div class="bg-slate-800/50 border border-slate-700/60 rounded-2xl overflow-hidden flex flex-col flex-1 shadow-2xl backdrop-blur-sm">
            
            <div class="grid grid-cols-5 border-b border-slate-700 bg-slate-800/80 text-center font-bold text-sm text-slate-300 py-3">
                <div class="col-span-2 text-indigo-400 border-l border-slate-700/50">ما</div>
                <div class="col-span-1 text-amber-400 border-l border-slate-700/50">تعهد</div>
                <div class="col-span-2 text-rose-400">اونا</div>
            </div>
            
            <div class="grid grid-cols-5 border-b border-slate-700/40 bg-slate-800/30 text-center text-xs text-slate-400 py-2 font-medium">
                <div class="border-l border-slate-700/30">دست</div>
                <div class="border-l border-slate-700/50 text-indigo-300/80">کل</div>
                <div class="border-l border-slate-700/50">تعهد</div>
                <div class="border-l border-slate-700/30 text-rose-300/80">کل</div>
                <div>دست</div>
            </div>

            <div class="divide-y divide-slate-700/30 overflow-y-auto custom-scrollbar flex-1 max-h-[50vh]">
                
                <div class="grid grid-cols-5 text-center py-3 text-sm font-semibold hover:bg-slate-700/20 transition-colors">
                    <div class="text-slate-300 border-l border-slate-700/30">+۱۰۰</div>
                    <div class="text-indigo-400 border-l border-slate-700/50">۱۰۰</div>
                    <div class="text-amber-400 font-bold border-l border-slate-700/50 bg-amber-500/5">۱۶۵</div>
                    <div class="text-rose-400 border-l border-slate-700/30">۰</div>
                    <div class="text-slate-500">-</div>
                </div>

                <div class="grid grid-cols-5 text-center py-3 text-sm font-semibold hover:bg-slate-700/20 transition-colors">
                    <div class="text-slate-500 border-l border-slate-700/30">-</div>
                    <div class="text-indigo-400 border-l border-slate-700/50">۱۰۰</div>
                    <div class="text-amber-400 font-bold border-l border-slate-700/50 bg-amber-500/5">۱۱۰</div>
                    <div class="text-rose-400 border-l border-slate-700/30">۱۱۰</div>
                    <div class="text-slate-300">+۱۱۰</div>
                </div>

                <div class="grid grid-cols-5 text-center py-3 text-sm font-semibold hover:bg-slate-700/20 transition-colors">
                    <div class="text-slate-300 border-l border-slate-700/30">+۶۵</div>
                    <div class="text-indigo-400 border-l border-slate-700/50">۱۶۵</div>
                    <div class="text-amber-400 font-bold border-l border-slate-700/50 bg-amber-500/5">۱۶۵</div>
                    <div class="text-rose-400 border-l border-slate-700/30">۱۱۰</div>
                    <div class="text-slate-500">-</div>
                </div>

            </div>

            <div class="bg-slate-800/80 p-3 text-center border-t border-slate-700 text-xs text-slate-400 flex justify-between items-center px-5">
                <span>دست‌های بازی شده: <strong class="text-slate-200">۳</strong></span>
                <span>اختلاف امتیاز: <strong class="text-emerald-400">۵۵+</strong></span>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-6 z-50 flex flex-col items-end gap-3">
        
        <div id="fabMenu" class="flex flex-col gap-2 scale-0 opacity-0 translate-y-10 origin-bottom transition-all duration-300 ease-out pointer-events-none">
            <button  class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 py-2 px-4 rounded-xl shadow-xl text-sm font-medium transition-all">
                <span>ویرایش امتیازها</span>
                <span class="text-base">✏️</span>
            </button>
            
            <button  class="flex items-center gap-2 bg-rose-950/80 hover:bg-rose-900 border border-rose-800 text-rose-200 py-2 px-4 rounded-xl shadow-xl text-sm font-medium transition-all">
                <span>حذف دست آخر</span>
                <span class="text-base">🗑️</span>
            </button>
            
            <button onclick="openModal()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white py-2.5 px-4 rounded-xl shadow-xl text-sm font-bold transition-all">
                <span>ثبت دست جدید</span>
                <span class="text-base">➕</span>
            </button>
        </div>

        <button id="fabBtn" onclick="toggleFab()" class="w-14 h-14 bg-gradient-to-tr from-emerald-500 to-teal-600 rounded-full flex items-center justify-center shadow-2xl text-white text-2xl focus:outline-none hover:scale-105 active:scale-95 transition-all duration-200 cursor-pointer">
            <span id="fabIcon" class="transition-transform duration-300">⚡</span>
        </button>
    </div>

    <div id="newHandModal" class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-2xl shadow-2xl p-5 transform scale-95 transition-transform duration-300">
            
            <div class="flex justify-between items-center mb-5 border-b border-slate-700 pb-3">
                <h3 class="text-md font-bold text-slate-100 flex items-center gap-2">
                    <span>🃏</span> ثبت اطلاعات دست جدید
                </h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-200 text-lg">✕</button>
            </div>

            <form onsubmit="event.preventDefault();" class="space-y-4">
                
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2">تعهد دست برای کدام تیم است؟</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex items-center justify-center py-2.5 px-3 bg-slate-700/50 rounded-xl cursor-pointer border border-transparent has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-600/20 text-sm font-semibold transition-all">
                            <input type="radio" name="team" value="us" class="hidden" checked>
                            تیم ما
                        </label>
                        <label class="flex items-center justify-center py-2.5 px-3 bg-slate-700/50 rounded-xl cursor-pointer border border-transparent has-[:checked]:border-rose-500 has-[:checked]:bg-rose-600/20 text-sm font-semibold transition-all">
                            <input type="radio" name="team" value="them" class="hidden">
                            تیم اونا
                        </label>
                    </div>
                </div>

                <div>
                    <label for="bidValue" class="block text-xs font-bold text-slate-400 mb-1.5">مقدار تعهد خوانده شده (مثلاً ۱۶۵):</label>
                    <input type="number" id="bidValue" placeholder="165" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-center font-bold text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors">
                </div>

                <div>
                    <label for="scoreValue" class="block text-xs font-bold text-slate-400 mb-1.5">امتیاز نهایی کسب شده در این دست:</label>
                    <input type="number" id="scoreValue" placeholder="165" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-center font-bold text-slate-100 focus:outline-none focus:border-emerald-500 transition-colors">
                </div>

                <div class="grid grid-cols-2 gap-2 pt-3">
                    <button type="button" onclick="closeModal()" class="w-full py-2.5 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl text-sm font-semibold transition-all">
                        انصراف
                    </button>
                    <button type="submit" class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-sm font-bold shadow-lg shadow-emerald-600/20 transition-all">
                        تایید و ثبت دست
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const fabMenu = document.getElementById('fabMenu');
        const fabBtn = document.getElementById('fabBtn');
        const fabIcon = document.getElementById('fabIcon');
        const modal = document.getElementById('newHandModal');
        const modalContent = modal.querySelector('div');

        // Toggle FAB Button Menu
        function toggleFab() {
            const isOpen = !fabMenu.classList.contains('scale-0');
            if (isOpen) {
                // Close menu
                fabMenu.classList.add('scale-0', 'opacity-0', 'translate-y-10', 'pointer-events-none');
                fabIcon.style.transform = 'rotate(0deg)';
                fabIcon.innerText = '⚡';
            } else {
                // Open menu
                fabMenu.classList.remove('scale-0', 'opacity-0', 'translate-y-10', 'pointer-events-none');
                fabIcon.style.transform = 'rotate(135deg)';
                fabIcon.innerText = '✕';
            }
        }

        // Open Modal Form
        function openModal() {
            toggleFab(); // Close FAB menu first
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        // Close Modal Form
        function closeModal() {
            modal.classList.remove('opacity-100');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Close modal if clicked outside the form box
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
